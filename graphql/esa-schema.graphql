# ─────────────────────────────────────────────
# Queries
# ─────────────────────────────────────────────

type Query {
  # Datalab queries
  datalab(id: ID!): Datalab
  datalabs(workspaceId: ID, status: DatalabStatus, page: Int, pageSize: Int): [Datalab]
  getDatalab(id: ID!): Datalab
  getDatalabs(workspaceId: ID, status: DatalabStatus): [Datalab]
  datalabFromInterface(interfaceId: ID!): Datalab
  extractDatalabMetadata(id: ID!): [DatalabMetadata]
  checkDatalabSecret(datalabId: ID!, secretName: String!): DatalabSecretCheck
  datalabPackages(datalabId: ID!): [DatalabPackage]
  getDatalabBuilds(datalabId: ID!): [DatalabBuild]
  getDatalabComments(datalabId: ID!): [UserComment]
  getDeploymentError(datalabId: ID!): DeploymentError
  getDatalabAccessList(datalabId: ID!): [User]
  getBuilds(page: Int, pageSize: Int): [DatalabBuild]

  # Pipeline queries
  pipelineRuns(pipelineId: ID, status: RunStatus, page: Int, pageSize: Int): [PipelineRun]
  pipelineRunDetails(runId: ID!): PipelineRun
  pipelineLogs(runId: ID!, page: Int, pageSize: Int): [PipelineLog]

  # Data infrastructure
  dataCentres: [DataCentre]
  dataVolumes(dataCentreId: ID): [DataVolume]
  dockerImages(registryId: ID): [DockerImage]
  dockerRegistry(id: ID!): DockerRegistry
  executionEngines: [ExecutionEngine]

  # User and access
  getUser(id: ID): User
  getUsers(page: Int, pageSize: Int): [User]
  getRole(id: ID!): Role
  getRoles: [Role]
  getPermissions: [Permission]
  getOperatorDefinedRoles: [Role]
  getRolesFromPermission(permissionId: ID!): [Role]
  authorizedObjects: [String]

  # Workspace
  getWorkspace(id: ID!): Workspace
  getWorkspaces: [Workspace]
  isWorkspaceNameAvailable(name: String!): Boolean

  # Bot
  bot(id: ID!): Bot
  bots: [Bot]

  # Quota and logging
  getQuota(userId: ID): Quota
  logs(params: LogParams): [Log]
  loggers: [String]
  getLogLevel(logger: String!): LogLevel

  # Bookmarks, announcements, help
  getBookmarks: [String]
  readAnnouncement(id: ID!): Announcement
  readHelpSectionIds: HelpPageIds
  getLicenses: [License]
  getFileActionEnvVars(datalabId: ID!): [EnvVarInfo]
  getAuthenticationState: AuthenticationState
}

# ─────────────────────────────────────────────
# Mutations
# ─────────────────────────────────────────────

type Mutation {
  # Datalab lifecycle
  createDatalab(input: CreateDatalabInput!): Datalab
  buildDatalab(id: ID!): DatalabBuild
  startDatalab(id: ID!): Datalab
  stopDatalab(id: ID!): Datalab
  destroyDatalab(id: ID!): ActionResult
  updateDatalabMetadata(id: ID!, metadata: [MetadataEntryInput]!): Datalab
  updateDatalabSchedule(id: ID!, schedule: ScheduleInput!): Datalab
  updateDatalabRuntimeConfiguration(id: ID!, config: RuntimeConfigurationInput!): Datalab
  cloneDatalab(id: ID!, newName: String!): Datalab
  addDatalabComment(datalabId: ID!, content: String!): UserComment
  deleteDatalabComment(commentId: ID!): ActionResult

  # Datalab access management
  grantDatalabAccess(datalabId: ID!, userId: ID!): ActionResult
  revokeDatalabAccess(datalabId: ID!, userId: ID!): ActionResult

  # Data volumes
  createDataVolume(input: DataVolumeInput!): DataVolume
  deleteDataVolume(id: ID!): ActionResult
  attachDataVolume(datalabId: ID!, volumeId: ID!, mountPath: String): Datalab
  detachDataVolume(datalabId: ID!, volumeId: ID!): Datalab

  # Pipelines (user)
  createUserPipeline(name: String!, description: String, code: UserPipelineCodeInput): UserPipeline
  updateUserPipeline(id: ID!, description: String, code: UserPipelineCodeInput): UserPipeline
  deleteUserPipeline(id: ID!): ActionResult
  runPipeline(input: PipelineRunInput!): PipelineRun
  stopPipelineRun(input: StopPipelineRunInput!): ActionResult
  deletePipelineRun(input: DeletePipelineRunInput!): ActionResult
  testPipelineRun(input: TestPipelineRunInput!): PipelineRun

  # Pipelines (system)
  createSystemPipeline(input: SystemPipelineInput!): SystemPipeline
  updateSystemPipeline(input: UpdateSystemPipelineInput!): SystemPipeline
  deleteSystemPipeline(input: DeleteSystemPipelineInput!): ActionResult
  runSystemPipeline(input: SystemPipelineRunInput!): PipelineRun

  # Docker
  addDockerRegistry(url: String!, name: String): DockerRegistry
  removeDockerRegistry(id: ID!): ActionResult
  pullDockerImage(registryId: ID!, imageName: String!, tag: String): DockerImage
  deleteDockerImage(id: ID!): ActionResult

  # Workspaces
  createWorkspace(name: String!, description: String): Workspace
  updateWorkspace(id: ID!, name: String, description: String): Workspace
  deleteWorkspace(id: ID!): ActionResult
  addWorkspaceMember(workspaceId: ID!, userId: ID!): Workspace
  removeWorkspaceMember(workspaceId: ID!, userId: ID!): Workspace

  # Users, roles, permissions
  createRole(input: CreateRoleInput!): Role
  updateRole(input: UpdateRoleInput!): Role
  deleteRole(id: ID!): ActionResult
  createPermission(input: CreatePermissionInput!): Permission
  deletePermission(id: ID!): ActionResult
  assignRole(userId: ID!, roleId: ID!): User
  revokeRole(userId: ID!, roleId: ID!): User

  # Bots
  createBot(input: BotInput!): Bot
  deleteBot(id: ID!): ActionResult
  regenerateBotToken(id: ID!): Bot

  # Logging and admin
  setLogLevel(logger: String!, level: LogLevel!): ActionResult
  createAnnouncement(title: String!, content: String!, severity: String, expiresAt: DateTime): Announcement
  updateAnnouncement(input: UpdateAnnouncementInput!): Announcement
  deleteAnnouncement(id: ID!): ActionResult
  sendNotification(input: NotificationInput!): Notification
  markNotificationRead(id: ID!): Notification

  # Bookmarks
  addBookmark(url: String!): ActionResult
  removeBookmark(url: String!): ActionResult
}

# ─────────────────────────────────────────────
# Subscriptions
# ─────────────────────────────────────────────

type Subscription {
  """Real-time build progress for a Datalab image build."""
  datalabBuildProgress(datalabId: ID!): BuildProgress

  """Stream build log lines for a Datalab image build."""
  datalabBuildLogs(datalabId: ID!): BuildLog

  """Real-time pipeline run progress events."""
  pipelineRunProgress(runId: ID!): PipelineRun

  """Real-time deployment monitoring events (all resources)."""
  monitoringEvents: MonitoringEvent
}
