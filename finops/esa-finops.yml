description: >-
  FOCUS-aligned FinOps for ESA public APIs. The primary metered surface is the
  Copernicus Data Space Ecosystem (CDSE) free tier, whose cost is zero for registered
  users up to the published monthly quotas. Beyond free-tier limits, CDSE offers
  extended quota access through the Copernicus Service framework and the ESA Network
  of Resources — commercial pricing for these paths is negotiated and not publicly
  listed. All other ESA scientific APIs (Gaia TAP, ESASky Legacy TAP, Space Weather
  HAPI, CCI ESGF, Datalabs GraphQL) are provided at no cost to the research community.
  The principal FinOps risk is unintended quota burn-down of openEO credits,
  Sentinel Hub processing units, or S3 transfer volume by automated pipelines running
  without cost guardrails.
sources:
  - https://documentation.dataspace.copernicus.eu/Quotas.html
  - https://dataspace.copernicus.eu/analyse/apis
  - https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: European Space Agency
serviceCategory: Earth Observation / Space Science
billingModel:
  pricingCategory: Free Tier with Extended Quota via Application
  billingFrequency: Monthly
  billingCurrency: EUR
  chargeCategories:
    - Usage
    - Credit
focusColumns:
  ServiceName: Copernicus Data Space Ecosystem
  ServiceCategory: Earth Observation
  ProviderName: European Space Agency (ESA)
  PublisherName: European Space Agency
  InvoiceIssuerName: European Commission / ESA
  BillingCurrency: EUR
