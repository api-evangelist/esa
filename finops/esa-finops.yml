meters:
  - name: sentinel_hub_requests
    description: >-
      Count of Sentinel Hub API requests consumed against the 10,000/month free
      quota. Each request may also consume processing units depending on the
      operation type and area of interest.
    unit: requests
    aggregation: sum
    dimensions:
      - user_account
      - api_endpoint
      - collection

  - name: sentinel_hub_processing_units
    description: >-
      Processing units (PU) consumed by Sentinel Hub operations. PU cost scales
      with the spatial area, number of bands, and script complexity.
    unit: processing_units
    aggregation: sum
    dimensions:
      - user_account
      - collection
      - resolution

  - name: openeo_credits
    description: >-
      openEO platform credits consumed from the 10,000/month free allocation.
      Credit consumption scales with the computational complexity and data volume
      of batch processing jobs.
    unit: credits
    aggregation: sum
    dimensions:
      - user_account
      - process_graph_id
      - collection

  - name: s3_transfer_volume
    description: >-
      Cumulative data transfer over S3/OData/STAC interfaces measured in a 30-day
      rolling window against the 12 TB free-tier limit. Exceeding throttles
      bandwidth to 1 MB/s.
    unit: GB
    aggregation: sum
    dimensions:
      - user_account
      - collection
      - product_type

  - name: direct_http_cog_requests
    description: >-
      Count of direct HTTP Cloud-Optimised GeoTIFF (COG) requests against the
      50,000/month free quota.
    unit: requests
    aggregation: sum
    dimensions:
      - user_account

  - name: data_workspace_products
    description: >-
      Count of offline product orders processed through Data Workspace against
      the 25/month free limit. This is the only interface for Deferred Available
      (offline) product retrieval.
    unit: products
    aggregation: sum
    dimensions:
      - user_account
      - product_type

principles:
  - name: Visibility
    description: >-
      Monitor Sentinel Hub processing unit consumption and openEO credit burn-rate
      using the CDSE dashboard. Set alerts when monthly usage exceeds 70% of free
      quota to avoid unexpected throttling mid-month. Track the 30-day rolling S3
      transfer window continuously for pipelines downloading large Sentinel products.

  - name: Allocation
    description: >-
      Separate CDSE user accounts per team or project to isolate quota pools.
      Tag all openEO batch jobs and Sentinel Hub requests with project identifiers
      via request metadata where supported. Maintain distinct credentials for
      development/test versus production pipelines to prevent test traffic from
      consuming production quota.

  - name: Optimization
    description: >-
      Use STAC or OData catalogue queries before downloading to filter products
      to the minimum necessary set. Prefer Cloud-Optimised GeoTIFF partial reads
      over full-product downloads to reduce S3 transfer volume. Cache Sentinel Hub
      rendered tiles to avoid re-processing identical requests. Schedule large
      openEO batch jobs early in the month when the credit pool is full. Use
      Sentinel Hub statistics endpoints in place of full imagery pulls for analysis
      workflows that only need aggregated metrics.

  - name: Accountability
    description: >-
      Assign a data engineering lead as quota owner per CDSE account. Review
      monthly usage against quota headroom before the reset date. For projects
      requiring sustained high-volume access, proactively apply for extended quota
      through the Copernicus Service desk or ESA Network of Resources to avoid
      mid-project throttling.
